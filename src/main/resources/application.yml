spring:
  application:
    name: citas-medicas
  profiles:
    # Por defecto se usa H2 en memoria para poder ejecutar sin instalar Postgres.
    # Para Postgres (docker-compose) ejecutar con: --spring.profiles.active=postgres
    active: ${SPRING_PROFILES_ACTIVE:h2}
  jpa:
    # Se mantiene activo para garantizar la carga de asociaciones perezosas durante la
    # serializacion de las respuestas REST. Los servicios de lectura usan ademas
    # @Transactional(readOnly = true).
    open-in-view: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    # Clave de ejemplo para desarrollo. En produccion debe inyectarse por variable de entorno.
    secret: ${JWT_SECRET:Z2NpdGFzbWVkaWNhc19ncnVwbzVfY2xhdmVfc2VjcmV0YV9wYXJhX2Rlc2Fycm9sbG8=}
    access-token-minutes: 60
    refresh-token-days: 7
  seed:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:citasmedicas;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/citasmedicas}
    username: ${DB_USERNAME:citas}
    password: ${DB_PASSWORD:citas}
    driver-class-name: org.postgresql.Driver
